<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary meta -->
    <title>Gather — Build a Bowl</title>
    <meta name="description" content="Customize your bowl with a base, protein, toppings, and sauce. A fast, accessible ordering experience built with React." />
    <meta name="author" content="Mirabelle Doiron" />
    <meta name="robots" content="noindex, nofollow" />

    <!-- Theme color — adapts to light/dark OS preference -->
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#111111" media="(prefers-color-scheme: dark)" />

    <!-- Font preload — fetches the regular weight in parallel with the JS bundle -->
    <link rel="preload" href="/IBM_Plex_Mono/IBMPlexMono-Regular.ttf" as="font" type="font/ttf" crossorigin />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Gather — Build a Bowl" />
    <meta property="og:description" content="Customize your bowl with a base, protein, toppings, and sauce." />
    <meta property="og:locale" content="en_US" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
