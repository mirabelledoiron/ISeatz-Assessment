name: CI — Lint & type check

on:
  push:
    branches:
      - main
      - mvp-build-mirabelle
  pull_request:

jobs:
  lint:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout branch
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc -b --pretty false
